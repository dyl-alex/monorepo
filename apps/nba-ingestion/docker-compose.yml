services:
  nba-ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - supabase
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    command: ["--help"]

networks:
  supabase:
    external: true
    name: supabase_default
